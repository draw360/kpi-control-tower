<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KPI Control Tower — ติดตาม Business Plan Goal</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
<style>
  :root {
    --bg: #EEF1F4; --surface: #FFFFFF; --ink: #17253B; --muted: #5B6B7F;
    --line: #D8DEE6; --plan: #17253B;
  }
  * , *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: 'IBM Plex Sans Thai', 'Noto Sans Thai', 'Leelawadee UI', 'Sukhumvit Set', Tahoma, sans-serif;
    font-size: 14.5px; line-height: 1.55;
  }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, 'Cascadia Mono', Menlo, monospace; font-variant-numeric: tabular-nums; }
  button { font: inherit; cursor: pointer; }
  :focus-visible { outline: 2px solid #146C94; outline-offset: 2px; border-radius: 4px; }

  /* ---- header ---- */
  .kct-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    padding: 14px 22px; background: var(--ink); color: #F4F7FA; position: sticky; top: 0; z-index: 20; }
  .kct-header-left { display: flex; align-items: center; gap: 12px; }
  .kct-logo { width: 40px; height: 40px; border: 1.5px solid rgba(255,255,255,.35); border-radius: 8px;
    display: grid; place-items: center; color: #FFD166; }
  .kct-title { font-weight: 700; letter-spacing: .14em; font-size: 15px; }
  .kct-subtitle { font-size: 12px; color: #AEBBCC; }
  .kct-header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .kct-save { font-size: 11.5px; color: #AEBBCC; margin-right: 4px; }
  .kct-save.error { color: #FF9E9E; }
  .kct-mode-toggle { display: flex; border: 1px solid rgba(255,255,255,.3); border-radius: 8px; overflow: hidden; }
  .kct-mode-toggle button { padding: 6px 14px; background: transparent; border: 0; color: #D7E0EA; font-size: 13px; }
  .kct-mode-toggle button.on { background: #F4F7FA; color: var(--ink); font-weight: 600; }

  .kct-btn { border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 500; }
  .kct-header .kct-btn.ghost { background: transparent; color: #D7E0EA; border-color: rgba(255,255,255,.3); }
  .kct-header .kct-btn.ghost:hover { background: rgba(255,255,255,.1); }
  .kct-btn.primary { background: #FFD166; border-color: #FFD166; color: #17253B; font-weight: 700; }
  .kct-btn.primary:hover { filter: brightness(.96); }
  .kct-btn.ghost:hover { background: #F1F4F7; }
  .kct-btn.tiny { padding: 3px 9px; font-size: 12px; }
  .kct-btn.danger { color: #C62828; border-color: #E7B9B9; }
  .kct-btn.danger.solid { background: #C62828; color: #fff; border-color: #C62828; }

  .kct-main { max-width: 1080px; margin: 0 auto; padding: 22px 22px 60px; }

  /* ---- hero ---- */
  .kct-hero { display: grid; grid-template-columns: 1.15fr 1fr; gap: 18px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 14px; padding: 22px; }
  .kct-eyebrow { font-size: 11.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .kct-hero-number { font-size: 52px; font-weight: 600; line-height: 1.1; margin: 4px 0 2px; }
  .kct-hero-caption { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .kct-hero-strips { display: grid; gap: 8px; align-content: center; }
  .kct-strip { display: flex; align-items: baseline; gap: 10px; border-left: 4px solid; border-radius: 8px; padding: 8px 14px; }
  .kct-strip-count { font-size: 22px; font-weight: 600; min-width: 34px; text-align: right; }
  .kct-strip-label { font-weight: 600; }
  .kct-strip-th { margin-left: auto; font-size: 11.5px; color: var(--muted); }

  /* ---- overall bar & glidepath (signature) ---- */
  .kct-obar-track, .kct-glide-track { position: relative; height: 18px; background: #E4E9EE;
    border-radius: 4px; overflow: visible;
    background-image: repeating-linear-gradient(90deg, transparent 0 calc(10% - 1px), #D2DAE2 calc(10% - 1px) 10%); }
  .kct-obar-fill, .kct-glide-fill { position: absolute; top: 3px; bottom: 3px; left: 0; border-radius: 3px;
    transition: width .5s cubic-bezier(.2,.8,.2,1); min-width: 2px; }
  .kct-plan-tick { position: absolute; top: -6px; bottom: -6px; width: 0;
    border-left: 2.5px solid var(--plan); }
  .kct-plan-tick::after { content: ""; position: absolute; left: 2px; top: 0; bottom: 0; border-left: 1.5px solid var(--plan); opacity: .45; }
  .kct-plan-flag { position: absolute; top: -16px; left: -2px; transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; font-weight: 600; letter-spacing: .06em;
    color: var(--plan); background: var(--surface); padding: 0 4px; border: 1px solid var(--line); border-radius: 3px; white-space: nowrap; }
  .kct-lv-tick { position: absolute; top: 1px; bottom: 1px; width: 0; border-left: 1.5px dashed #8B99AB; }
  .kct-lv-flag { position: absolute; bottom: -15px; left: 0; transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace; font-size: 8.5px; font-weight: 600; color: #8B99AB; white-space: nowrap; }
  .kct-obar { margin-top: 20px; padding-right: 8px; }
  .kct-obar-mark { position: absolute; top: 3px; bottom: 3px; width: 1px; background: #9DAABB; }
  .kct-glide { margin: 22px 0 10px; padding-right: 8px; }
  .kct-glide.has-lv { margin-bottom: 22px; }
  .kct-glide-caption { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .kct-glide.has-lv .kct-glide-caption { margin-top: 18px; }
  @media (prefers-reduced-motion: reduce) { .kct-obar-fill, .kct-glide-fill { transition: none; } }

  /* ---- controls ---- */
  .kct-controls { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; margin: 20px 0 14px; }
  .kct-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .kct-tab { border: 1px solid var(--line); background: var(--surface); border-radius: 999px;
    padding: 6px 14px; font-size: 13px; color: var(--muted); display: flex; gap: 7px; align-items: center; }
  .kct-tab.on { background: var(--ink); border-color: var(--ink); color: #fff; font-weight: 600; }
  .kct-tab-count { font-size: 11px; opacity: .75; }
  .kct-sort { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .kct-sort select { font: inherit; padding: 6px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--ink); }

  /* ---- KPI cards ---- */
  .kct-list { display: grid; gap: 12px; }
  .kct-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px 14px; }
  .kct-card-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .kct-card-id { display: flex; gap: 6px; }
  .kct-chip { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px; background: #EDF1F5; color: var(--muted); }
  .kct-chip.p-high { background: #FBE5E5; color: #C62828; }
  .kct-chip.p-mid { background: #FBF0DD; color: #C77700; }
  .kct-chip.p-low { background: #E7F2E7; color: #2E7D32; }
  .kct-card-name { font-weight: 700; font-size: 15.5px; flex: 1; min-width: 200px; }
  .kct-card-side { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .kct-status { font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 999px; white-space: nowrap; }

  .kct-card-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .kct-figures { display: flex; gap: 26px; flex-wrap: wrap; }
  .kct-fig { display: flex; flex-direction: column; gap: 1px; }
  .kct-fig-label { font-size: 10.5px; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .kct-fig-value { font-size: 15px; }
  .kct-fig-value.strong { font-weight: 600; font-size: 16px; }
  .kct-gap-pct { font-size: 12px; opacity: .85; }
  .kct-card-meta { display: flex; gap: 14px; font-size: 11.5px; color: var(--muted); flex-wrap: wrap; }
  .kct-note { margin-top: 8px; font-size: 12.5px; color: var(--muted); border-top: 1px dashed var(--line); padding-top: 7px; }

  .kct-quick-btn { background: #F6F8FA; border: 1px dashed #B9C4D0; border-radius: 6px; padding: 2px 8px; text-align: left; }
  .kct-quick-btn:hover { border-color: #146C94; background: #EFF6FA; }
  .kct-pencil { font-size: 11px; color: var(--muted); }
  .kct-quick-wrap { display: flex; align-items: center; gap: 6px; }
  .kct-quick-input { width: 120px; font-size: 15px; padding: 2px 8px; border: 1.5px solid #146C94; border-radius: 6px;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .kct-quick-unit { font-size: 12.5px; color: var(--muted); }

  .kct-empty { background: var(--surface); border: 1px dashed var(--line); border-radius: 12px;
    padding: 40px; text-align: center; color: var(--muted); }

  /* ---- modal / form ---- */
  .kct-overlay { position: fixed; inset: 0; background: rgba(23,37,59,.45); display: grid;
    place-items: center; z-index: 50; padding: 18px; }
  .kct-overlay[hidden] { display: none; }
  .kct-modal { background: var(--surface); border-radius: 14px; width: min(720px, 100%);
    max-height: 90vh; overflow: auto; box-shadow: 0 18px 50px rgba(23,37,59,.3); }
  .kct-modal-head { display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--line); font-weight: 700; font-size: 15px; }
  .kct-form { padding: 18px 20px 20px; }
  .kct-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
  .kct-form-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .kct-form-grid label.span2 { grid-column: 1 / -1; }
  .kct-form-grid input, .kct-form-grid select, .kct-form-grid textarea {
    font: inherit; font-weight: 400; color: var(--ink); padding: 8px 10px;
    border: 1px solid var(--line); border-radius: 8px; background: #FBFCFD; }
  .kct-form-grid textarea { resize: vertical; }
  .kct-lv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .kct-lv-grid label { font-size: 11px; }
  .kct-lv-hint { grid-column: 1 / -1; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: -4px; }
  .kct-w-pair { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; }
  .kct-form-err { margin-top: 12px; color: #C62828; background: #FBE5E5; border-radius: 8px; padding: 8px 12px; font-size: 13px; }
  .kct-form-err:empty { display: none; }
  .kct-form-actions { display: flex; align-items: center; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .kct-del-confirm { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #C62828; font-weight: 600; }

  .kct-th-row { display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid var(--line); }
  .kct-th-label { display: flex; align-items: center; gap: 9px; font-weight: 600; flex-wrap: wrap; }
  .kct-th-label small { color: var(--muted); font-weight: 400; width: 100%; margin-left: 21px; }
  .kct-th-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .kct-th-input { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .kct-th-input input { width: 84px; font: inherit; padding: 6px 9px; border: 1px solid var(--line); border-radius: 8px; text-align: right;
    font-family: 'IBM Plex Mono', ui-monospace, monospace; }

  .kct-toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px;
    box-shadow: 0 8px 24px rgba(23,37,59,.35); z-index: 60; }
  .kct-toast[hidden] { display: none; }

  /* ---- report ---- */
  .kct-report { max-width: 980px; margin: 0 auto; padding: 18px 22px 60px; background: #fff; }
  .kct-report-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: #FBF6E7; border: 1px solid #EAD9A8; border-radius: 10px; padding: 10px 16px;
    font-size: 13px; color: #6B5B23; margin-bottom: 18px; flex-wrap: wrap; }
  .kct-report-toolbar .left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .kct-report-toolbar select { font: inherit; padding: 6px 10px; border: 1px solid #EAD9A8; border-radius: 8px; background: #fff; color: var(--ink); }
  .kct-report-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
    border-bottom: 3px solid var(--ink); padding-bottom: 14px; margin-bottom: 6px; flex-wrap: wrap; }
  .kct-report-title { font-size: 20px; font-weight: 700; }
  .kct-report-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .kct-report-overall { text-align: right; }
  .kct-report-overall-label { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .kct-report-overall-num { font-size: 30px; font-weight: 600; line-height: 1.15; }
  .kct-report-overall-counts { display: flex; gap: 12px; font-size: 11.5px; justify-content: flex-end; flex-wrap: wrap; }
  .kct-report-group { margin-top: 20px; break-inside: avoid; }
  .kct-report-cat { font-size: 15px; font-weight: 700; margin: 0 0 8px; padding-left: 10px; border-left: 4px solid var(--ink); }
  .kct-table { width: 100%; border-collapse: collapse; font-size: 12.8px; }
  .kct-table th { text-align: left; font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); border-bottom: 2px solid var(--ink); padding: 6px 8px; }
  .kct-table td { border-bottom: 1px solid var(--line); padding: 8px; vertical-align: top; }
  .kct-table .num { text-align: right; white-space: nowrap; }
  .kct-table tr { break-inside: avoid; page-break-inside: avoid; }
  .kct-td-name { font-weight: 600; }
  .kct-td-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .kct-td-badge { font-weight: 600; }
  .kct-td-note { font-size: 12px; }
  .kct-report-foot { margin-top: 26px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 10px; }

  /* ---- report: charts ---- */
  .kct-chart-summary { display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center;
    margin-top: 18px; padding: 16px 18px; border: 1px solid var(--line); border-radius: 12px; break-inside: avoid; }
  .kct-donut-legend { display: grid; gap: 6px; font-size: 12.5px; }
  .kct-donut-legend .row { display: flex; align-items: center; gap: 8px; }
  .kct-donut-legend .dot { width: 11px; height: 11px; border-radius: 3px; }
  .kct-donut-legend .n { margin-left: auto; font-weight: 600; }
  .kct-barchart { margin-top: 8px; }
  .kct-bar-row { display: grid; grid-template-columns: 200px 1fr 92px; gap: 10px; align-items: center; padding: 5px 0; }
  .kct-bar-name { font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kct-bar-track { position: relative; height: 15px; background: #EDF1F5; border-radius: 3px; }
  .kct-bar-fill { position: absolute; top: 2px; bottom: 2px; left: 0; border-radius: 2px; min-width: 2px; }
  .kct-bar-plan { position: absolute; top: -3px; bottom: -3px; border-left: 2px solid var(--ink); }
  .kct-bar-val { font-size: 12px; text-align: right; white-space: nowrap; }
  .kct-chart-axis { display: grid; grid-template-columns: 200px 1fr 92px; gap: 10px; font-size: 10px; color: var(--muted); }
  .kct-chart-axis .scale { position: relative; height: 14px; }
  .kct-chart-axis .scale span { position: absolute; transform: translateX(-50%); }
  .kct-catchart { display: flex; align-items: flex-end; gap: 18px; height: 190px; margin-top: 14px;
    padding: 0 8px 0 8px; border-bottom: 2px solid var(--ink); position: relative; break-inside: avoid; }
  .kct-catcol { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; height: 100%; min-width: 0; }
  .kct-catcol .bar { width: 60%; max-width: 64px; border-radius: 4px 4px 0 0; }
  .kct-catcol .val { font-size: 11.5px; font-weight: 600; margin-bottom: 3px; }
  .kct-catcol .lbl { font-size: 11px; color: var(--muted); margin-top: 5px; text-align: center;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; position: absolute; bottom: -22px; }
  .kct-catcol { position: relative; }
  .kct-catchart-wrap { padding-bottom: 26px; }
  .kct-cat-planline { position: absolute; left: 0; right: 0; border-top: 2px dashed #8B99AB; }
  .kct-cat-planline span { position: absolute; right: 0; top: -15px; font-size: 9.5px; color: #8B99AB; font-family: 'IBM Plex Mono', monospace; }

  /* ---- report: executive scorecard ---- */
  .kct-x-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
  .kct-x-card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; break-inside: avoid; }
  .kct-x-cat { display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; margin-bottom: 10px; }
  .kct-x-cat .name { font-weight: 700; flex: 1; }
  .kct-x-cat .achv { font-weight: 600; font-size: 17px; }
  .kct-x-kpi { margin: 9px 0; }
  .kct-x-kpi-top { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; margin-bottom: 3px; }
  .kct-x-kpi-top .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kct-x-kpi-top .vv { white-space: nowrap; font-weight: 600; }
  .kct-x-track { position: relative; height: 10px; background: #EDF1F5; border-radius: 3px; }
  .kct-x-fill { position: absolute; top: 2px; bottom: 2px; left: 0; border-radius: 2px; min-width: 2px; }
  .kct-x-plan { position: absolute; top: -2px; bottom: -2px; border-left: 2px solid var(--ink); }
  .kct-watch { margin-top: 18px; border: 1px solid #F3D3A0; background: #FDF8EE; border-radius: 12px; padding: 14px 16px; break-inside: avoid; }
  .kct-watch h3 { margin: 0 0 8px; font-size: 14px; color: #8A5A00; }
  .kct-watch-row { display: flex; gap: 12px; align-items: baseline; padding: 5px 0; border-bottom: 1px dashed #EAD9A8; font-size: 12.8px; flex-wrap: wrap; }
  .kct-watch-row:last-child { border-bottom: 0; }
  .kct-watch-row .nm { font-weight: 600; flex: 1; min-width: 160px; }

  /* ---- print ---- */
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; font-size: 12px; }
    .kct-report { max-width: none; padding: 0; }
    .kct-report-group { break-inside: auto; }
    thead { display: table-header-group; }
    .kct-table tr, .kct-report-cat, .kct-chart-summary, .kct-x-card, .kct-watch, .kct-catchart-wrap, .kct-bar-row { break-inside: avoid; page-break-inside: avoid; }
    .kct-status { border: 1px solid currentColor; }
    .kct-x-grid { grid-template-columns: 1fr 1fr; }
    @page { margin: 14mm 12mm; }
  }

  /* ---- responsive ---- */
  @media (max-width: 760px) {
    .kct-hero { grid-template-columns: 1fr; }
    .kct-hero-number { font-size: 42px; }
    .kct-form-grid { grid-template-columns: 1fr; }
    .kct-figures { gap: 16px; }
    .kct-report-head { flex-direction: column; }
    .kct-report-overall { text-align: left; }
    .kct-report-overall-counts { justify-content: flex-start; }
    .kct-bar-row, .kct-chart-axis { grid-template-columns: 110px 1fr 78px; }
    .kct-x-grid { grid-template-columns: 1fr; }
    .kct-chart-summary { grid-template-columns: 1fr; justify-items: center; }
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="kct-header no-print">
  <div class="kct-header-left">
    <div class="kct-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2v3M7 5h10l-2 5H9L7 5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M10 10l-1.5 12M14 10l1.5 12M8 16h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="kct-title">KPI CONTROL TOWER</div>
      <div class="kct-subtitle">ติดตาม Business Plan Goal · Actual เทียบ Plan · Target L1–L5</div>
    </div>
  </div>
  <div class="kct-header-actions">
    <span class="kct-save" id="saveIndicator">พร้อมใช้งาน</span>

<!-- ===== Dashboard ===== -->
<main class="kct-main" id="viewDashboard">
  <section class="kct-hero" id="hero"></section>
  <section class="kct-controls">
    <div class="kct-tabs" id="tabs" role="tablist" aria-label="หมวดหมู่"></div>

      <select id="sortSelect">
        <option value="worst">หลุดแผนมากสุดก่อน</option>
        <option value="priority">ลำดับความสำคัญ (Priority)</option>
        <option value="category">หมวดหมู่ · ชื่อ</option>

<main class="kct-report" id="viewReport" hidden></main>

<!-- ===== Modal & toast ===== -->
<div class="kct-overlay no-print" id="modalOverlay" hidden>
  <div class="kct-modal" role="dialog" aria-modal="true" id="modalBox"></div>
</div>
<div class="kct-toast no-print" id="toast" hidden></div>

<script>
"use strict";

/* ============================================================
   KPI CONTROL TOWER v2 — standalone single-file app (vanilla JS)
   + Target L1–L5, Weight พร้อมหน่วย, ฟอร์มไม่บังคับกรอก,
   + รายงาน 3 รูปแบบ: ตาราง / กราฟ / Executive Scorecard
   ============================================================ */

const STORAGE_KEY = "kpi-control-tower:v1";
const DEFAULT_THRESHOLDS = { excellent: 120, onplan: 100, atrisk: 85 };

const STATUS_META = {
  excellent: { label: "ยอดเยี่ยม",     color: "#146C94", bg: "#E3F0F7" },
  onplan:    { label: "ตามแผน",       color: "#2E7D32", bg: "#E7F2E7" },
  atrisk:    { label: "เสี่ยงหลุดแผน", color: "#C77700", bg: "#FBF0DD" },
  offplan:   { label: "หลุดแผน",      color: "#C62828", bg: "#FBE5E5" },
};
const NA_META = { label: "ไม่มีข้อมูล", color: "#5B6B7F", bg: "#EEF1F4" };
const STATUS_ORDER = ["excellent", "onplan", "atrisk", "offplan"];
const PRIORITIES = ["สูง", "กลาง", "ต่ำ"];
const PRIORITY_ORDER = { "สูง": 0, "กลาง": 1, "ต่ำ": 2 };
const PRIORITY_CLASS = { "สูง": "p-high", "กลาง": "p-mid", "ต่ำ": "p-low" };
const WEIGHT_UNITS = ["%", "pts", "คะแนน", "x"];
const LV_KEYS = ["l1", "l2", "l3", "l4", "l5"];

const uid = () =>
  (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : "id-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);

const SEED_KPIS = () => [
  { id: uid(), category: "รายได้", name: "รายได้รวมจากธุรกิจใหม่", unit: "ล้านบาท",
    plan: 850, actual: 1030, direction: "higher", period: "FY2026",
    owner: "ทีมพัฒนาธุรกิจ", weight: 30, weightUnit: "%", priority: "สูง",
    targets: { l1: 600, l2: 720, l3: 850, l4: 950, l5: 1050 },
    note: "รวมรายได้จากทุก Venture ที่เริ่มรับรู้รายได้แล้ว", updatedAt: new Date().toISOString() },
  { id: uid(), category: "การลงทุน", name: "มูลค่าดีลลงทุนใหม่ (Committed)", unit: "ล้านบาท",
    plan: 500, actual: 505, direction: "higher", period: "FY2026",
    owner: "ทีมการลงทุน", weight: 25, weightUnit: "%", priority: "สูง",
    targets: { l1: 300, l2: 400, l3: 500, l4: 600, l5: 700 },
    note: "นับเฉพาะดีลที่ลงนามสัญญาแล้ว", updatedAt: new Date().toISOString() },
  { id: uid(), category: "การลงทุน", name: "จำนวนดีลที่ปิดได้", unit: "ดีล",
    plan: 8, actual: 7, direction: "higher", period: "FY2026",
    owner: "ทีมการลงทุน", weight: 15, weightUnit: "%", priority: "กลาง",
    targets: {},
    note: "อยู่ระหว่าง Due Diligence อีก 2 ดีล", updatedAt: new Date().toISOString() },
  { id: uid(), category: "ต้นทุน", name: "ค่าใช้จ่ายดำเนินงาน (OPEX)", unit: "ล้านบาท",
    plan: 120, actual: 150, direction: "lower", period: "FY2026",
    owner: "ฝ่ายการเงิน", weight: 20, weightUnit: "%", priority: "สูง",
    targets: { l1: 140, l2: 130, l3: 120, l4: 110, l5: 100 },
    note: "เกินแผนจากค่าที่ปรึกษาโครงการเร่งด่วน", updatedAt: new Date().toISOString() },
  { id: uid(), category: "องค์กร", name: "อัตราการรักษาพนักงาน (Retention)", unit: "%",
    plan: 90, actual: 92, direction: "higher", period: "FY2026",
    owner: "ฝ่ายทรัพยากรบุคคล", weight: 10, weightUnit: "%", priority: "กลาง",
    targets: {},
    note: "", updatedAt: new Date().toISOString() },
];

/* ---------------- storage adapter ---------------- */
const store = (() => {
  if (window.storage && typeof window.storage.get === "function") {
    return {
      persistent: true,
      async get() { try { const r = await window.storage.get(STORAGE_KEY); return r && r.value != null ? r.value : null; } catch (e) { return null; } },
      async set(v) { try { const r = await window.storage.set(STORAGE_KEY, v); return !!r; } catch (e) { return false; } },
    };
  }
  try {
    const t = "__kct_test__";
    window.localStorage.setItem(t, "1");
    window.localStorage.removeItem(t);
    return {
      persistent: true,
      async get() { try { return window.localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } },
      async set(v) { try { window.localStorage.setItem(STORAGE_KEY, v); return true; } catch (e) { return false; } },
    };
  } catch (e) {
    let mem = null;
    return {
      persistent: false,
      async get() { return mem; },
      async set(v) { mem = v; return true; },
    };
  }
})();

/* ---------------- state ---------------- */
const state = {
  kpis: [],
  thresholds: { excellent: 120, onplan: 100, atrisk: 85 },
  mode: "dashboard",
  activeCat: "ทั้งหมด",
  sortBy: "worst",
  reportStyle: "table", // table | charts | scorecard
};
let saveTimer = null;
let toastTimer = null;

/* ---------------- helpers ---------------- */
function numOrNull(v) {
  if (v === "" || v == null) return null;
  const n = Number(v);
  return isFinite(n) ? n : null;
}
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function fmtNum(n, digits) {
  if (n == null || !isFinite(n)) return "—";
  const abs = Math.abs(n);
  const d = abs >= 1000 ? 0 : abs >= 100 ? 1 : (digits == null ? 2 : digits);
  return Number(n).toLocaleString("th-TH", { maximumFractionDigits: d, minimumFractionDigits: 0 });
}
function fmtPct(n, digits) {
  if (n == null || !isFinite(n)) return "—";
  return Number(n).toLocaleString("th-TH", { maximumFractionDigits: digits == null ? 1 : digits }) + "%";
}
function fmtDateTime(iso) {
  try {
    return new Date(iso).toLocaleString("th-TH", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
  } catch (e) { return "—"; }
}
function dispName(k) { return k.name && k.name.trim() ? k.name : "(ไม่ระบุชื่อ)"; }
function dispCat(k) { return k.category && k.category.trim() ? k.category : "ไม่ระบุหมวด"; }
function weightText(k) {
  const w = numOrNull(k.weight);
  if (w == null) return null;
  return fmtNum(w, 1) + (k.weightUnit ? " " + k.weightUnit : "");
}

/* ---------------- calculations ---------------- */
function achievementOf(k) {
  const plan = numOrNull(k.plan), actual = numOrNull(k.actual);
  if (plan == null || actual == null) return null;
  if (k.direction === "lower") {
    if (actual <= 0) return plan <= 0 ? 100 : 999;
    return (plan / actual) * 100;
  }
  if (plan <= 0) return actual > 0 ? 999 : 100;
  return (actual / plan) * 100;
}
function statusOf(ach, t) {
  if (ach == null) return null;
  if (ach >= t.excellent) return "excellent";
  if (ach >= t.onplan) return "onplan";
  if (ach >= t.atrisk) return "atrisk";
  return "offplan";
}
/* gap: บวก = ดีกว่าแผน, ลบ = แย่กว่าแผน (คิดตามทิศทาง) */
function gapOf(k) {
  const plan = numOrNull(k.plan), actual = numOrNull(k.actual);
  if (plan == null || actual == null) return null;
  const raw = k.direction === "lower" ? plan - actual : actual - plan;
  const pct = plan !== 0 ? (raw / Math.abs(plan)) * 100 : null;
  return { raw: raw, pct: pct };
}
function definedLevels(k) {
  const out = [];
  LV_KEYS.forEach((key, i) => {
    const v = numOrNull(k.targets && k.targets[key]);
    if (v != null) out.push({ lv: i + 1, val: v });
  });
  return out;
}
/* คะแนนระดับ 0–5 จาก Target L1–L5 (interpolate เชิงเส้นระหว่างระดับที่ระบุ) */
function levelScoreOf(k) {
  const actual = numOrNull(k.actual);
  if (actual == null) return null;
  const pts = definedLevels(k);
  if (pts.length === 0) return null;
  const dirLower = k.direction === "lower";
  const meets = (val) => dirLower ? actual <= val : actual >= val;

  let metLv = 0;
  pts.forEach((p) => { if (meets(p.val)) metLv = Math.max(metLv, p.lv); });

  let score;
  if (pts.length === 1) {
    score = meets(pts[0].val) ? pts[0].lv : Math.max(0, pts[0].lv - 1);
  } else {
    const interp = (a, b, x) => {
      if (b.val === a.val) return Math.max(a.lv, b.lv);
      return a.lv + ((x - a.val) / (b.val - a.val)) * (b.lv - a.lv);
    };
    score = null;
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i], b = pts[i + 1];
      const lo = Math.min(a.val, b.val), hi = Math.max(a.val, b.val);
      if (actual >= lo && actual <= hi) { score = interp(a, b, actual); break; }
    }
    if (score == null) {
      const sFirst = interp(pts[0], pts[1], actual);
      const sLast = interp(pts[pts.length - 2], pts[pts.length - 1], actual);
      score = sLast > pts[pts.length - 1].lv ? sLast : sFirst;
    }
  }
  score = Math.max(0, Math.min(5, score));
  return { score: score, metLv: metLv, points: pts };
}
function overallAchievement(kpis, t) {
  let wsum = 0, asum = 0;
  const counts = { excellent: 0, onplan: 0, atrisk: 0, offplan: 0 };
  let noData = 0;
  kpis.forEach((k) => {
    const ach = achievementOf(k);
    if (ach == null) { noData++; return; }
    const w0 = numOrNull(k.weight);
    const w = w0 != null && w0 > 0 ? w0 : 1;
    wsum += w; asum += ach * w;
    const s = statusOf(ach, t);
    if (s) counts[s] += 1;
  });
  return { overall: wsum > 0 ? asum / wsum : null, counts: counts, noData: noData };
}
function categoryAchievement(list, t) {
  return overallAchievement(list, t);
}

/* ---------------- persistence ---------------- */
function normalizeKpi(k) {
  const targets = {};
  LV_KEYS.forEach((key) => { targets[key] = numOrNull(k.targets && k.targets[key]); });
  return {
    id: k.id || uid(),
    category: String(k.category || ""),
    name: String(k.name || ""),
    unit: String(k.unit || ""),
    plan: numOrNull(k.plan),
    actual: numOrNull(k.actual),
    direction: k.direction === "lower" ? "lower" : "higher",
    period: String(k.period || ""),
    owner: String(k.owner || ""),
    weight: numOrNull(k.weight),
    weightUnit: String(k.weightUnit || ""),
    priority: PRIORITIES.indexOf(k.priority) !== -1 ? k.priority : "กลาง",
    targets: targets,
    note: String(k.note || ""),
    updatedAt: k.updatedAt || new Date().toISOString(),
  };
}
async function loadState() {
  const raw = await store.get();
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.kpis)) {
        state.kpis = parsed.kpis.map(normalizeKpi);
        state.thresholds = Object.assign({}, DEFAULT_THRESHOLDS, parsed.thresholds || {});
        return;
      }
    } catch (e) { /* ข้อมูลเสีย → ใช้ seed */ }
  }
  state.kpis = SEED_KPIS().map(normalizeKpi);
}
function scheduleSave() {
  const el = document.getElementById("saveIndicator");
  el.textContent = "กำลังบันทึก…"; el.classList.remove("error");
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const ok = await store.set(JSON.stringify({ kpis: state.kpis, thresholds: state.thresholds }));
    if (ok) {
      el.textContent = store.persistent ? "บันทึกแล้ว" : "บันทึกชั่วคราว (เบราว์เซอร์นี้ปิด localStorage)";
      el.classList.toggle("error", !store.persistent);
    } else {
      el.textContent = "บันทึกไม่สำเร็จ"; el.classList.add("error");
    }
  }, 500);
}
function commit() { scheduleSave(); render(); }

function notify(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.hidden = false;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.hidden = true; }, 2600);
}

/* ---------------- rendering: dashboard ---------------- */
function planTickHTML(leftPct, flagText) {
  return '<div class="kct-plan-tick" style="left:' + leftPct + '%">' +
    '<span class="kct-plan-flag">' + esc(flagText) + "</span></div>";
}

function renderHero() {
  const t = state.thresholds;
  const res = overallAchievement(state.kpis, t);
  const overall = res.overall, counts = res.counts;
  const st = statusOf(overall, t);
  const color = st ? STATUS_META[st].color : "var(--ink)";

  let barHTML = "";
  if (overall != null) {
    const max = Math.max(140, t.excellent + 20, Math.min(overall * 1.1, 300));
    const pct = (v) => Math.min(100, Math.max(0, (v / max) * 100));
    barHTML =
      '<div class="kct-obar" aria-hidden="true"><div class="kct-obar-track">' +
      '<div class="kct-obar-fill" style="width:' + pct(overall) + "%;background:" + color + '"></div>' +
      planTickHTML(pct(100), "PLAN 100%") +
      '<div class="kct-obar-mark" style="left:' + pct(t.atrisk) + '%" title="เสี่ยง ' + t.atrisk + '%"></div>' +
      '<div class="kct-obar-mark" style="left:' + pct(t.excellent) + '%" title="ยอดเยี่ยม ' + t.excellent + '%"></div>' +
      "</div></div>";
  }

  const strips = STATUS_ORDER.map((s) => {
    const m = STATUS_META[s];
    const th = s === "excellent" ? "≥" + t.excellent + "%"
      : s === "onplan" ? "≥" + t.onplan + "%"
      : s === "atrisk" ? "≥" + t.atrisk + "%"
      : "<" + t.atrisk + "%";
    return '<div class="kct-strip" style="border-left-color:' + m.color + ";background:" + m.bg + '">' +
      '<span class="kct-strip-count mono" style="color:' + m.color + '">' + counts[s] + "</span>" +
      '<span class="kct-strip-label">' + m.label + "</span>" +
      '<span class="kct-strip-th mono">' + esc(th) + "</span></div>";
  }).join("");

  const noDataNote = res.noData > 0 ? " · ยังไม่มีข้อมูลครบ " + res.noData + " KPI" : "";

  document.getElementById("hero").innerHTML =
    '<div class="kct-hero-left">' +
      '<div class="kct-eyebrow">Overall Achievement · ถ่วงน้ำหนักด้วย Weight</div>' +
      '<div class="kct-hero-number mono" style="color:' + color + '">' + fmtPct(overall, 1) + "</div>" +
      '<div class="kct-hero-caption">' +
        (st ? "สถานะภาพรวม: " + STATUS_META[st].label : "ยังไม่มีข้อมูล KPI ที่คำนวณได้") +
        " · " + state.kpis.length + " KPI" + noDataNote + "</div>" +
      barHTML +
    "</div>" +
    '<div class="kct-hero-strips">' + strips + "</div>";
}

function renderTabs() {
  const cats = ["ทั้งหมด"].concat(Array.from(new Set(state.kpis.map((k) => dispCat(k)))));
  if (cats.indexOf(state.activeCat) === -1) state.activeCat = "ทั้งหมด";
  document.getElementById("tabs").innerHTML = cats.map((c) => {
    const n = c === "ทั้งหมด" ? state.kpis.length : state.kpis.filter((k) => dispCat(k) === c).length;
    return '<button class="kct-tab' + (state.activeCat === c ? " on" : "") + '" role="tab" ' +
      'aria-selected="' + (state.activeCat === c) + '" data-cat="' + esc(c) + '">' +
      esc(c) + ' <span class="kct-tab-count mono">' + n + "</span></button>";
  }).join("");
}

function sortedVisible() {
  let list = state.activeCat === "ทั้งหมด"
    ? state.kpis.slice()
    : state.kpis.filter((k) => dispCat(k) === state.activeCat);
  const ach = (k) => { const a = achievementOf(k); return a == null ? Infinity : a; };
  if (state.sortBy === "worst") list.sort((a, b) => ach(a) - ach(b));
  else if (state.sortBy === "priority")
    list.sort((a, b) =>
      ((PRIORITY_ORDER[a.priority] != null ? PRIORITY_ORDER[a.priority] : 9) -
       (PRIORITY_ORDER[b.priority] != null ? PRIORITY_ORDER[b.priority] : 9)) || (ach(a) - ach(b)));
  else
    list.sort((a, b) =>
      dispCat(a).localeCompare(dispCat(b), "th") ||
      dispName(a).localeCompare(dispName(b), "th"));
  return list;
}

function glideHTML(k, meta) {
  const plan = numOrNull(k.plan), actual = numOrNull(k.actual);
  const lvs = definedLevels(k);
  const nums = [];
  if (plan != null) nums.push(Math.abs(plan));
  if (actual != null) nums.push(Math.abs(actual));
  lvs.forEach((p) => nums.push(Math.abs(p.val)));
  if (nums.length === 0) return "";
  const biggest = Math.max.apply(null, nums.concat([1]));
  const max = biggest * 1.18;
  const pct = (v) => Math.min(100, Math.max(0, (v / max) * 100));
  const goalText = k.direction === "lower" ? "เป้า: ต่ำกว่าเส้น PLAN" : "เป้า: ถึง/เกินเส้น PLAN";

  let inner = "";
  if (actual != null) {
    inner += '<div class="kct-glide-fill" style="width:' + pct(actual) + "%;background:" + meta.color + '"></div>';
  }
  lvs.forEach((p) => {
    inner += '<div class="kct-lv-tick" style="left:' + pct(p.val) + '%">' +
      '<span class="kct-lv-flag">L' + p.lv + "</span></div>";
  });
  if (plan != null) inner += planTickHTML(pct(plan), "PLAN");

  return '<div class="kct-glide' + (lvs.length ? " has-lv" : "") + '"><div class="kct-glide-track">' + inner +
    '</div><div class="kct-glide-caption">' + goalText +
    (lvs.length ? " · ขีดประ = Target L1–L5" : "") + "</div></div>";
}

function kpiCardHTML(k) {
  const t = state.thresholds;
  const ach = achievementOf(k);
  const st = statusOf(ach, t);
  const meta = st ? STATUS_META[st] : NA_META;
  const gap = gapOf(k);
  const lvScore = levelScoreOf(k);

  /* gap badge */
  let gapHTML = "";
  if (gap) {
    const good = gap.raw >= 0;
    const arrow = k.direction === "lower" ? (good ? "▼" : "▲") : (good ? "▲" : "▼");
    const gcolor = good ? "#2E7D32" : "#C62828";
    gapHTML =
      '<div class="kct-fig"><span class="kct-fig-label">Gap เทียบแผน</span>' +
      '<span class="kct-fig-value mono" style="color:' + gcolor + '">' +
      arrow + " " + (good ? "+" : "−") + fmtNum(Math.abs(gap.raw)) + " " + esc(k.unit) +
      (gap.pct != null ? ' <span class="kct-gap-pct">(' + (good ? "+" : "−") + fmtNum(Math.abs(gap.pct), 1) + "%)</span>" : "") +
      "</span></div>";
  }

  /* level score badge */
  let lvHTML = "";
  if (lvScore) {
    lvHTML =
      '<div class="kct-fig"><span class="kct-fig-label">Target Level</span>' +
      '<span class="kct-fig-value mono strong">' +
      (lvScore.metLv > 0 ? "L" + lvScore.metLv : "ต่ำกว่า L" + lvScore.points[0].lv) +
      ' <span class="kct-gap-pct">(' + lvScore.score.toFixed(2) + "/5)</span></span></div>";
  }

  const wt = weightText(k);
  const weightChip = wt ? '<span class="kct-chip mono">w ' + esc(wt) + "</span>" : "";

  const actualBtnText = numOrNull(k.actual) != null
    ? fmtNum(k.actual) + " " + esc(k.unit)
    : "— ระบุค่า";

      dispName(a).localeCompare(dispName(b), "th"))

      if (!groups.has(c)) groups.set(c, []);
      groups.get(c).push(k);

}

/* ---- style 2: charts ---- */
function donutSVG(counts, size) {
  const total = STATUS_ORDER.reduce((s, k) => s + counts[k], 0);
  const r = 54, cw = 22, c = size / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let segs = "";
  if (total === 0) {
    segs = '<circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="none" stroke="#E4E9EE" stroke-width="' + cw + '"/>';
  } else {
    STATUS_ORDER.forEach((s) => {
      if (!counts[s]) return;
      const frac = counts[s] / total;
      const len = frac * circ;
      segs += '<circle cx="' + c + '" cy="' + c + '" r="' + r + '" fill="none" stroke="' + STATUS_META[s].color +
        '" stroke-width="' + cw + '" stroke-dasharray="' + len + " " + (circ - len) +
        '" stroke-dashoffset="' + (-offset) + '" transform="rotate(-90 ' + c + " " + c + ')"/>';
      offset += len;
    });
  }
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + " " + size + '" role="img" aria-label="สัดส่วน KPI ตามสถานะ">' +
    segs +
    '<text x="' + c + '" y="' + (c - 4) + '" text-anchor="middle" font-size="26" font-weight="600" fill="#17253B" font-family="IBM Plex Mono, monospace">' + total + "</text>" +
    '<text x="' + c + '" y="' + (c + 16) + '" text-anchor="middle" font-size="11" fill="#5B6B7F">KPI</text>' +
  "</svg>";
}

function reportChartsHTML(groups, counts) {
  const t = state.thresholds;
  const CAP = 160; // แสดงสูงสุด 160% บนแกน

  const legend = STATUS_ORDER.map((s) =>
    '<div class="row"><span class="dot" style="background:' + STATUS_META[s].color + '"></span>' +
    STATUS_META[s].label + '<span class="n mono">' + counts[s] + "</span></div>").join("");

  let html =
    '<section class="kct-chart-summary">' +
      donutSVG(counts, 150) +
      '<div class="kct-donut-legend">' + legend + "</div>" +
    "</section>";

  /* กราฟแท่งเทียบ Achievement รายหมวด */
  const catData = [];
  groups.forEach((list, cat) => {
    const r = categoryAchievement(list, t);
    if (r.overall != null) catData.push({ cat: cat, val: r.overall, st: statusOf(r.overall, t) });
  });
  if (catData.length) {
    const capped = (v) => Math.min(v, CAP);
    const H = 160;
    const cols = catData.map((d) => {
      const h = Math.max(4, (capped(d.val) / CAP) * H);
      const color = d.st ? STATUS_META[d.st].color : "#5B6B7F";
      return '<div class="kct-catcol">' +
        '<div class="val mono" style="color:' + color + '">' + fmtPct(d.val, 0) + "</div>" +
        '<div class="bar" style="height:' + h + "px;background:" + color + '"></div>' +
        '<div class="lbl">' + esc(d.cat) + "</div></div>";
    }).join("");
    const planY = H - (100 / CAP) * H;
    html +=
      '<section class="kct-report-group kct-catchart-wrap">' +
        '<h2 class="kct-report-cat">Achievement รายหมวดหมู่ (ถ่วงน้ำหนัก)</h2>' +
        '<div class="kct-catchart" style="height:' + (H + 30) + 'px">' +
          '<div class="kct-cat-planline" style="top:' + (planY + 30) + 'px"><span>PLAN 100%</span></div>' +
          cols +
        "</div>" +
      "</section>";
  }

  /* กราฟแท่งแนวนอนราย KPI แยกหมวด */
  groups.forEach((list, cat) => {
    const rows = list.map((k) => {
      const ach = achievementOf(k);
      const s = statusOf(ach, t);
      const meta = s ? STATUS_META[s] : NA_META;
      const w = ach == null ? 0 : Math.min(100, (Math.min(ach, CAP) / CAP) * 100);
      return '<div class="kct-bar-row">' +
        '<div class="kct-bar-name" title="' + esc(dispName(k)) + '">' + esc(dispName(k)) + "</div>" +
        '<div class="kct-bar-track">' +
          (ach != null ? '<div class="kct-bar-fill" style="width:' + w + "%;background:" + meta.color + '"></div>' : "") +
          '<div class="kct-bar-plan" style="left:' + (100 / CAP) * 100 + '%"></div>' +
        "</div>" +
        '<div class="kct-bar-val mono" style="color:' + meta.color + '">' + fmtPct(ach, 1) +
          (ach != null && ach > CAP ? " ▸" : "") + "</div>" +
      "</div>";
    }).join("");
    html +=
      '<section class="kct-report-group">' +
        '<h2 class="kct-report-cat">' + esc(cat) + ' <span class="mono">(' + list.length + ")</span></h2>" +
        '<div class="kct-barchart">' + rows +
          '<div class="kct-chart-axis"><span></span><div class="scale">' +
            '<span style="left:0%">0%</span>' +
            '<span style="left:' + (100 / CAP) * 100 + '%">100% (PLAN)</span>' +
            '<span style="left:100%">' + CAP + "%+</span>" +
          "</div><span></span></div>" +
        "</div>" +
      "</section>";
  });
  return html;
}

/* ---- style 3: executive scorecard ---- */
function reportScorecardHTML(groups) {
  const t = state.thresholds;
  const CAP = 160;

  let cards = "";
  groups.forEach((list, cat) => {
    const r = categoryAchievement(list, t);
    const st = statusOf(r.overall, t);
    const color = st ? STATUS_META[st].color : "#5B6B7F";
    const kpiRows = list.map((k) => {
      const ach = achievementOf(k);
      const s = statusOf(ach, t);
      const meta = s ? STATUS_META[s] : NA_META;
      const w = ach == null ? 0 : Math.min(100, (Math.min(ach, CAP) / CAP) * 100);
      const lv = levelScoreOf(k);
      return '<div class="kct-x-kpi">' +
        '<div class="kct-x-kpi-top">' +
          '<span class="nm" title="' + esc(dispName(k)) + '">' + esc(dispName(k)) + "</span>" +
          '<span class="vv mono" style="color:' + meta.color + '">' + fmtPct(ach, 0) +
            (lv ? ' <span style="font-weight:400;color:#5B6B7F">· ' + (lv.metLv > 0 ? "L" + lv.metLv : "&lt;L" + lv.points[0].lv) + "</span>" : "") +
          "</span>" +
        "</div>" +
        '<div class="kct-x-track">' +
          (ach != null ? '<div class="kct-x-fill" style="width:' + w + "%;background:" + meta.color + '"></div>' : "") +
          '<div class="kct-x-plan" style="left:' + (100 / CAP) * 100 + '%"></div>' +
        "</div>" +
      "</div>";
    }).join("");
    cards +=
      '<div class="kct-x-card">' +
        '<div class="kct-x-cat">' +
          '<span class="name">' + esc(cat) + "</span>" +
          '<span class="achv mono" style="color:' + color + '">' + fmtPct(r.overall, 1) + "</span>" +
        "</div>" + kpiRows +
      "</div>";
  });

  /* Watchlist: เสี่ยง + หลุดแผน เรียงแย่สุดก่อน */
  const watch = state.kpis
    .map((k) => ({ k: k, ach: achievementOf(k) }))
    .filter((x) => { const s = statusOf(x.ach, t); return s === "atrisk" || s === "offplan"; })
    .sort((a, b) => a.ach - b.ach);
  let watchHTML = "";
  if (watch.length) {
    watchHTML = '<section class="kct-watch"><h3>⚠ Watchlist — ต้องติดตามใกล้ชิด (' + watch.length + " รายการ)</h3>" +
      watch.map((x) => {
        const k = x.k;
        const gap = gapOf(k);
        const s = statusOf(x.ach, t);
        const meta = STATUS_META[s];
        return '<div class="kct-watch-row">' +
          '<span class="nm">' + esc(dispName(k)) + ' <span style="font-weight:400;color:#5B6B7F">(' + esc(dispCat(k)) + ")</span></span>" +
          '<span class="mono" style="color:' + meta.color + '">' + fmtPct(x.ach, 1) + "</span>" +
          (gap ? '<span class="mono" style="color:#C62828">' + (gap.raw >= 0 ? "+" : "−") + fmtNum(Math.abs(gap.raw)) + " " + esc(k.unit) + "</span>" : "") +
          (k.owner ? '<span style="color:#5B6B7F">' + esc(k.owner) + "</span>" : "") +
        "</div>";
      }).join("") +
    "</section>";
  }

  return '<div class="kct-x-grid">' + cards + "</div>" + watchHTML;
}

/* ---- report root ---- */
function renderReport() {
  const t = state.thresholds;
  const res = overallAchievement(state.kpis, t);
  const st = statusOf(res.overall, t);
  const groups = reportGroups();

  let body;
  if (state.kpis.length === 0) {
    body = '<div class="kct-empty">ยังไม่มีข้อมูล KPI สำหรับออกรายงาน</div>';
  } else if (state.reportStyle === "charts") {
    body = reportChartsHTML(groups, res.counts);
  } else if (state.reportStyle === "scorecard") {
    body = reportScorecardHTML(groups);
  } else {
    body = reportTableHTML(groups);
  }

  document.getElementById("viewReport").innerHTML =
    '<div class="kct-report-toolbar no-print">' +
      '<div class="left"><span>รูปแบบรายงาน</span>' +
        '<select id="reportStyleSelect">' +
          '<option value="table"' + (state.reportStyle === "table" ? " selected" : "") + ">ตารางสรุป (Table)</option>" +
          '<option value="charts"' + (state.reportStyle === "charts" ? " selected" : "") + ">กราฟ (Charts)</option>" +
          '<option value="scorecard"' + (state.reportStyle === "scorecard" ? " selected" : "") + ">Executive Scorecard</option>" +
        "</select>" +
        "<span>จัดหน้าสำหรับพิมพ์ / PDF — ปุ่มและเมนูถูกซ่อนตอนพิมพ์</span>" +
      "</div>" +
      '<button class="kct-btn primary" id="btnPrint">พิมพ์ / บันทึก PDF</button>' +
    "</div>" +
    reportHeadHTML(res.overall, res.counts, st) +
    body +
    reportFootHTML();

  const btn = document.getElementById("btnPrint");
  if (btn) btn.addEventListener("click", () => window.print());
  const sel = document.getElementById("reportStyleSelect");
  if (sel) sel.addEventListener("change", (e) => { state.reportStyle = e.target.value; renderReport(); });
}

/* ---------------- render root ---------------- */
function render() {
  const dash = document.getElementById("viewDashboard");
  const rep = document.getElementById("viewReport");
  document.getElementById("btnModeDash").classList.toggle("on", state.mode === "dashboard");
  document.getElementById("btnModeReport").classList.toggle("on", state.mode === "report");
  document.getElementById("btnAdd").style.display = state.mode === "dashboard" ? "" : "none";
  if (state.mode === "dashboard") {
    dash.hidden = false; rep.hidden = true;
    renderHero(); renderTabs(); renderList();
  } else {
    dash.hidden = true; rep.hidden = false;
    renderReport();
  }
}

/* ---------------- quick edit (inline actual) ---------------- */
function startQuickEdit(card, k) {
  const btn = card.querySelector('[data-action="quick"]');
  if (!btn) return;
  const wrap = document.createElement("span");
  wrap.className = "kct-quick-wrap";
  wrap.innerHTML = '<input class="kct-quick-input" type="number" step="any" />' +
    '<span class="kct-quick-unit">' + esc(k.unit) + "</span>";
  btn.replaceWith(wrap);
  const input = wrap.querySelector("input");
  input.value = numOrNull(k.actual) != null ? k.actual : "";
  input.focus(); input.select();
  let done = false;
  const finish = (save) => {
    if (done) return; done = true;
    if (save) {
      const v = numOrNull(input.value);
      if (v !== numOrNull(k.actual)) {
        k.actual = v; k.updatedAt = new Date().toISOString();
        commit(); return;
      }
    }
    render();
  };
  input.addEventListener("blur", () => finish(true));
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") finish(true);
    if (e.key === "Escape") finish(false);
  });
}

      "</label>" +
      '<label>ทิศทางที่ดี<select id="f_direction">' +
        '<option value="higher"' + (f.direction !== "lower" ? " selected" : "") + ">ยิ่งสูงยิ่งดี (higher)</option>" +
        '<option value="lower"' + (f.direction === "lower" ? " selected" : "") + ">ยิ่งต่ำยิ่งดี (lower) เช่น ต้นทุน</option>" +
      "</select></label>" +
      '<label>ช่วงเวลา (Period)<input id="f_period" value="' + esc(f.period) + '" placeholder="เช่น FY2026" /></label>' +
      '<label>Weight (น้ำหนักคะแนน) และหน่วย' +
        '<div class="kct-w-pair">' +
          '<input id="f_weight" class="mono" type="number" step="any" value="' + esc(vOrEmpty(f.weight)) + '" placeholder="เช่น 20" />' +
          '<input id="f_weightUnit" list="kct-wunits" value="' + esc(f.weightUnit || "") + '" placeholder="%, pts, …" />' +
          '<datalist id="kct-wunits">' + WEIGHT_UNITS.map((u) => '<option value="' + esc(u) + '"></option>').join("") + "</datalist>" +
        "</div>" +
      "</label>" +
      '<label>Priority<select id="f_priority">' +
        PRIORITIES.map((p) => '<option value="' + p + '"' + (f.priority === p ? " selected" : "") + ">" + p + "</option>").join("") +
      "</select></label>" +
      '<label>ผู้รับผิดชอบ (Owner)<input id="f_owner" value="' + esc(f.owner) + '" /></label>' +
      '<label class="span2">คำอธิบายเพิ่มเติม (Note)<textarea id="f_note" rows="2">' + esc(f.note) + "</textarea></label>" +
    "</div>" +
    '<div class="kct-form-err" id="f_err"></div>' +
    '<div class="kct-form-actions">' +
      (isEdit ? '<span id="delZone"><button class="kct-btn danger ghost" data-action="ask-delete">ลบ KPI นี้</button></span>' : "") +
      '<span style="flex:1"></span>' +
      '<button class="kct-btn ghost" data-action="close-modal">ยกเลิก</button>' +
      '<button class="kct-btn primary" data-action="save-kpi">' + (isEdit ? "บันทึกการแก้ไข" : "เพิ่ม KPI") + "</button>" +
    "</div></div>"
  );

  const box = document.getElementById("modalBox");
  box.querySelector('[data-action="save-kpi"]').addEventListener("click", () => {
    const val = (id) => document.getElementById(id).value;
    const targets = {};
    LV_KEYS.forEach((key) => { targets[key] = numOrNull(val("f_" + key)); });
    const data = {
      category: val("f_category").trim(),
      name: val("f_name").trim(),
      unit: val("f_unit").trim(),
      plan: numOrNull(val("f_plan")),
      actual: numOrNull(val("f_actual")),
      direction: val("f_direction") === "lower" ? "lower" : "higher",
      period: val("f_period").trim(),
      owner: val("f_owner").trim(),
      weight: numOrNull(val("f_weight")),
      weightUnit: val("f_weightUnit").trim(),
      priority: val("f_priority"),
      targets: targets,
      note: val("f_note").trim(),
      updatedAt: new Date().toISOString(),
    };
    if (isEdit) {
      Object.assign(kpi, data);
      notify("บันทึกการแก้ไข KPI แล้ว");
    } else {
      state.kpis.push(Object.assign({ id: uid() }, data));
      notify("เพิ่ม KPI ใหม่แล้ว");
    }
    closeModal(); commit();
  });

  if (isEdit) {
    box.querySelector('[data-action="ask-delete"]').addEventListener("click", () => {
      document.getElementById("delZone").innerHTML =
        '<span class="kct-del-confirm">ยืนยันลบ? ' +
        '<button class="kct-btn danger solid tiny" data-action="do-delete">ลบถาวร</button> ' +
        '<button class="kct-btn ghost tiny" data-action="cancel-delete">ยกเลิก</button></span>';
      box.querySelector('[data-action="do-delete"]').addEventListener("click", () => {
        state.kpis = state.kpis.filter((x) => x.id !== kpi.id);
        closeModal(); notify("ลบ KPI แล้ว"); commit();
      });
      box.querySelector('[data-action="cancel-delete"]').addEventListener("click", () => openKpiForm(kpi));
    });
  }
}

/* ---------------- threshold settings ---------------- */
function openSettings() {
  const t = state.thresholds;
  const row = (key, desc, inputHTML) =>
    '<div class="kct-th-row"><span class="kct-th-label">' +
      '<span class="kct-th-dot" style="background:' + STATUS_META[key].color + '"></span>' +
      STATUS_META[key].label + "<small>" + desc + "</small></span>" +
      '<span class="kct-th-input">' + inputHTML + "</span></div>";

  openModal(
    '<div class="kct-modal-head"><span>ตั้งค่าเกณฑ์สถานะ (Threshold)</span>' +
      '<button class="kct-btn tiny ghost" data-action="close-modal" aria-label="ปิด">✕</button></div>' +
    '<div class="kct-form">' +
      row("excellent", "Achievement ตั้งแต่ค่านี้ขึ้นไป",
        '≥ <input id="t_excellent" type="number" step="any" value="' + t.excellent + '" /> %') +
      row("onplan", "Achievement ตั้งแต่ค่านี้ขึ้นไป (แต่ไม่ถึงยอดเยี่ยม)",
        '≥ <input id="t_onplan" type="number" step="any" value="' + t.onplan + '" /> %') +
      row("atrisk", "Achievement ตั้งแต่ค่านี้ขึ้นไป — ต่ำกว่านี้ถือว่าหลุดแผน",
        '≥ <input id="t_atrisk" type="number" step="any" value="' + t.atrisk + '" /> %') +
      row("offplan", 'ต่ำกว่าเกณฑ์ "เสี่ยงหลุดแผน" โดยอัตโนมัติ',
        '<span class="mono" id="t_off_preview">&lt; ' + t.atrisk + " %</span>") +
      '<div class="kct-form-err" id="t_err"></div>' +
      '<div class="kct-form-actions">' +
        '<button class="kct-btn ghost" data-action="reset-th">คืนค่าเริ่มต้น (120 / 100 / 85)</button>' +
        '<span style="flex:1"></span>' +
        '<button class="kct-btn ghost" data-action="close-modal">ยกเลิก</button>' +
        '<button class="kct-btn primary" data-action="save-th">บันทึกเกณฑ์</button>' +
      "</div></div>"
  );

  const box = document.getElementById("modalBox");
  const atriskInput = document.getElementById("t_atrisk");
  atriskInput.addEventListener("input", () => {
    document.getElementById("t_off_preview").innerHTML = "&lt; " + esc(atriskInput.value || "—") + " %";
  });
  box.querySelector('[data-action="reset-th"]').addEventListener("click", () => {
    document.getElementById("t_excellent").value = DEFAULT_THRESHOLDS.excellent;
    document.getElementById("t_onplan").value = DEFAULT_THRESHOLDS.onplan;
    atriskInput.value = DEFAULT_THRESHOLDS.atrisk;
    document.getElementById("t_off_preview").innerHTML = "&lt; " + DEFAULT_THRESHOLDS.atrisk + " %";
  });
  box.querySelector('[data-action="save-th"]').addEventListener("click", () => {
    const ex = Number(document.getElementById("t_excellent").value);
    const on = Number(document.getElementById("t_onplan").value);
    const ar = Number(atriskInput.value);
    const err = document.getElementById("t_err");
    if (![ex, on, ar].every(isFinite)) { err.textContent = "ทุกค่าต้องเป็นตัวเลข"; return; }
    if (!(ex > on && on > ar)) { err.textContent = "เกณฑ์ต้องเรียงจากมากไปน้อย: ยอดเยี่ยม > ตามแผน > เสี่ยงหลุดแผน"; return; }
    state.thresholds = { excellent: ex, onplan: on, atrisk: ar };
    closeModal(); notify("อัปเดตเกณฑ์สถานะแล้ว"); commit();
  });
}

/* ---------------- export / import ---------------- */
function doExport() {
  const payload = {
    app: "KPI Control Tower", version: 2,
    exportedAt: new Date().toISOString(),
    thresholds: state.thresholds, kpis: state.kpis,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "kpi-control-tower-" + new Date().toISOString().slice(0, 10) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  notify("ส่งออกไฟล์ JSON แล้ว");
}

function doImport(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const list = Array.isArray(parsed) ? parsed : parsed.kpis;
      if (!Array.isArray(list)) throw new Error("format");
      state.kpis = list.map(normalizeKpi);
      if (parsed.thresholds) {
        state.thresholds = Object.assign({}, DEFAULT_THRESHOLDS, parsed.thresholds);
      }
      notify("นำเข้าแล้ว " + state.kpis.length + " KPI");
      commit();
    } catch (e) {
      notify("นำเข้าไม่สำเร็จ — รูปแบบไฟล์ไม่ถูกต้อง");
    }
  };
  reader.readAsText(file);
}

/* ---------------- wire up events ---------------- */
document.getElementById("btnModeDash").addEventListener("click", () => { state.mode = "dashboard"; render(); });
document.getElementById("btnModeReport").addEventListener("click", () => { state.mode = "report"; render(); });
document.getElementById("btnAdd").addEventListener("click", () => openKpiForm(null));
document.getElementById("btnSettings").addEventListener("click", openSettings);
document.getElementById("btnExport").addEventListener("click", doExport);
document.getElementById("btnImport").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) doImport(f);
  e.target.value = "";
});
document.getElementById("sortSelect").addEventListener("change", (e) => { state.sortBy = e.target.value; renderList(); });

/* tabs (delegation) */
document.getElementById("tabs").addEventListener("click", (e) => {
  const btn = e.target.closest("[data-cat]");
  if (!btn) return;
  state.activeCat = btn.getAttribute("data-cat");
  renderTabs(); renderList();
});

/* card actions (delegation) */
document.getElementById("kpiList").addEventListener("click", (e) => {
  const actionEl = e.target.closest("[data-action]");
  if (!actionEl) return;
  const card = e.target.closest(".kct-card");
  if (!card) return;
  const k = state.kpis.find((x) => x.id === card.getAttribute("data-id"));
  if (!k) return;
  const action = actionEl.getAttribute("data-action");
  if (action === "edit") openKpiForm(k);
  else if (action === "quick") startQuickEdit(card, k);
});

/* modal: close by ✕ / ยกเลิก / คลิกพื้นหลัง / Esc */
document.getElementById("modalOverlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) { closeModal(); return; }
  const closeBtn = e.target.closest('[data-action="close-modal"]');
  if (closeBtn) closeModal();
});
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !document.getElementById("modalOverlay").hidden) closeModal();
});

/* ---------------- boot ---------------- */
(async function init() {
  await loadState();
  if (!store.persistent) {
    notify("เบราว์เซอร์นี้ปิด localStorage — ข้อมูลจะหายเมื่อปิดหน้า กรุณาใช้ Export JSON เก็บข้อมูลไว้");
  }
  render();
  scheduleSave();
})();
</script>
</body>
